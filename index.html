<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Fralda - 1 Samuel 1:27</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-site: #e5e0d8; 
            --arco-bg: #fdfaf5;
            --dourado-arco: #dccbb4;
            --marrom-texto: #5d4a3e;
            --dourado-texto: #bc9c70;
            --nuvem-azul-desenho: rgba(173, 216, 230, 0.85); 
        }

        /* RESET PARA EVITAR ROLAGEM LATERAL */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* Mata o espaço extra na direita */
            background-color: var(--bg-site);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--marrom-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        #fundo-animado {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .estrela-fundo {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: piscarEstrela 3s infinite ease-in-out;
        }

        /* NUVENS POSICIONADAS PARA NÃO EMPURRAR O LAYOUT */
        .nuvem-desenho {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            background: var(--nuvem-azul-desenho);
            border-radius: 50px;
            animation: flutuarDesenho 10s infinite ease-in-out;
        }

        .nv-shape { position: absolute; background: inherit; border-radius: 50%; }

        .nv-1 { width: 140px; height: 60px; top: 5%; left: -20px; }
        .nv-1 .shape-a { width: 70px; height: 70px; top: -35px; left: 20px; }
        
        .nv-2 { width: 160px; height: 70px; top: 40%; right: -30px; }
        .nv-2 .shape-a { width: 85px; height: 85px; top: -45px; right: 30px; }

        .nv-3 { width: 120px; height: 50px; bottom: 15%; left: -10px; }
        
        .nv-4 { width: 150px; height: 60px; bottom: 5%; right: -20px; }

        /* CONTAINER CENTRALIZADO */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto; /* Centralização garantida */
        }

        .card-arco {
            width: 100%;
            background: var(--arco-bg);
            border: 7px solid var(--dourado-arco);
            border-radius: 200px 200px 40px 40px;
            padding: 60px 25px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.2rem; 
            color: var(--dourado-texto); 
            margin-bottom: 10px;
        }
        
        .versiculo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 15px 0;
            color: #8a766a;
        }

        .data-info {
            background: rgba(220, 203, 180, 0.15);
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid rgba(188, 156, 112, 0.2);
        }

        .btn-stack { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            background: white;
            border: 2px solid var(--dourado-texto);
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: var(--marrom-texto);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        /* MODAL CORRIGIDO - FIXO NO CENTRO DA TELA */
        .modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--arco-bg);
            padding: 30px;
            border-radius: 25px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 5px solid var(--dourado-arco);
            position: relative;
            margin: auto; /* Força centralização dentro do viewport fixo */
        }

        @keyframes flutuarDesenho {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(8px, -8px); }
        }

        @keyframes piscarEstrela {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="fundo-animado"></div>

    <div class="nuvem-desenho nv-1"><div class="nv-shape shape-a"></div></div>
    <div class="nuvem-desenho nv-2"><div class="nv-shape shape-a"></div></div>
    <div class="nuvem-desenho nv-3"></div>
    <div class="nuvem-desenho nv-4"></div>

    <div class="main-container">
        <div class="card-arco">
            <h1>Chá de Fralda</h1>
            <div class="versiculo">
                “Por este menino orava eu; e o Senhor me concedeu a petição que eu lhe fiz.”<br>
                <strong>1 SAMUEL 1:27</strong>
            </div>
            <div class="data-info">📅 12 DE JULHO DE 2026<br>🕒 ÀS 16:00 HORAS</div>
            <p style="font-size: 0.75rem; margin-bottom: 20px;">📍 RUA ITAPETININGA, 104</p>
            
            <div class="btn-stack">
                <a href="https://forms.gle/CN7gDBXfRJ5Yu6ky5" target="_blank" class="btn"><span>✅</span> CONFIRMAR PRESENÇA</a>
                <button class="btn" onclick="window.open('https://maps.app.goo.gl/8QiL9cSS7SXr73xS8', '_blank')"><span>📍</span> LOCALIZAÇÃO</button>
                <button class="btn" onclick="openModal()"><span>🎁</span> SUGESTÃO DE PRESENTES</button>
            </div>
        </div>
    </div>

    <div id="modalP" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="font-family: 'Playfair Display'; color: var(--dourado-texto); margin-bottom: 15px;">Sugestão de Presentes</h2>
            <p style="margin-bottom: 20px;">Fralda + Mimo</p>
            <div style="display: flex; justify-content: space-around; font-weight: bold; color: var(--dourado-texto); font-size: 1.3rem; margin-bottom: 25px;">
                <span>P</span> <span>M</span> <span>G</span>
            </div>
            <button class="btn" style="background: var(--dourado-texto); color: white; width: 100%;" onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <script>
        // Gerador de estrelas no fundo
        const fundo = document.getElementById('fundo-animado');
        for (let i = 0; i < 40; i++) {
            const estrela = document.createElement('div');
            estrela.className = 'estrela-fundo';
            estrela.style.left = Math.random() * 100 + 'vw';
            estrela.style.top = Math.random() * 100 + 'vh';
            const size = Math.random() * 3 + 1 + 'px';
            estrela.style.width = size;
            estrela.style.height = size;
            estrela.style.animationDelay = Math.random() * 5 + 's';
            fundo.appendChild(estrela);
        }

        function openModal() {
            document.getElementById('modalP').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modalP').style.display = 'none';
        }
    </script>
</body>
</html>
