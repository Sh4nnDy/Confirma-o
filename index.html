<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Fralda - 1 Samuel 1:27</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-site: #e5e0d8; 
            --arco-bg: #fdfaf5;
            --dourado-arco: #dccbb4;
            --marrom-texto: #5d4a3e;
            --dourado-texto: #bc9c70;
            /* Cor azul desenho com transparência controlada */
            --nuvem-azul-desenho: rgba(173, 216, 230, 0.85); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-site);
            font-family: 'Montserrat', sans-serif;
            color: var(--marrom-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            position: relative;
        }

        /* FUNDO DE ESTRELAS */
        #fundo-animado {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .estrela-fundo {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: piscarEstrela 3s infinite ease-in-out;
            z-index: 1;
        }

        .estrela-interna {
            position: absolute;
            font-size: 12px;
            animation: pulse 2s infinite;
            z-index: 5;
            pointer-events: none;
        }

        .gemini-symbol {
            position: absolute;
            color: var(--dourado-texto);
            font-size: 20px;
            z-index: 105; 
            animation: pulsarGemini 2s infinite ease-in-out;
            pointer-events: none;
        }

        /* NUVENS EM FORMATO DE DESENHO (FORMAS NÍTIDAS) */
        .nuvem-desenho {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            background: var(--nuvem-azul-desenho);
            border-radius: 50px;
            /* Removido o blur para ficar com aspecto de desenho/formas */
            filter: none; 
            animation: flutuarDesenho 10s infinite ease-in-out;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .nv-shape {
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        /* Estrutura de formas circulares para compor a nuvem */
        .nv-1 { width: 140px; height: 60px; top: 8%; left: -30px; animation-duration: 8s; }
        .nv-1 .shape-a { width: 70px; height: 70px; top: -35px; left: 20px; }
        .nv-1 .shape-b { width: 60px; height: 60px; top: -20px; right: 15px; }

        .nv-2 { width: 160px; height: 70px; top: 40%; right: -40px; animation-delay: 1s; animation-duration: 11s; }
        .nv-2 .shape-a { width: 85px; height: 85px; top: -45px; right: 30px; }
        .nv-2 .shape-b { width: 70px; height: 70px; top: -25px; left: 20px; }

        .nv-3 { width: 130px; height: 55px; bottom: 20%; left: -20px; animation-delay: 2s; animation-duration: 9s; }
        .nv-3 .shape-a { width: 65px; height: 65px; top: -30px; left: 25px; }

        .nv-4 { width: 150px; height: 65px; bottom: 5%; right: -30px; animation-delay: 1.5s; animation-duration: 10s; }
        .nv-4 .shape-a { width: 80px; height: 80px; top: -40px; right: 35px; }

        .main-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10; 
        }

        .card-arco {
            width: 100%;
            height: 100%;
            background: var(--arco-bg);
            border: 7px solid var(--dourado-arco);
            border-radius: 210px 210px 45px 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 30px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden; 
        }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.4rem; 
            color: var(--dourado-texto); 
            margin-bottom: 10px;
            position: relative;
            z-index: 6;
        }
        
        .versiculo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #8a766a;
            position: relative;
            z-index: 6;
        }

        .data-info {
            background: rgba(220, 203, 180, 0.15);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(188, 156, 112, 0.2);
            position: relative;
            z-index: 6;
        }

        .btn-stack { width: 100%; display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 6; }
        
        .btn {
            background: white;
            border: 2px solid var(--dourado-texto);
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            color: var(--marrom-texto);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--dourado-texto);
            color: white;
            transform: translateY(-3px);
        }

        @keyframes flutuarDesenho {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(15px, -10px); }
        }

        @keyframes pulsarGemini {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes piscarEstrela {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: var(--arco-bg);
            padding: 40px 30px;
            border-radius: 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            border: 5px solid var(--dourado-arco);
        }
    </style>
</head>
<body>

    <div id="fundo-animado"></div>

    <div class="nuvem-desenho nv-1"><div class="nv-shape shape-a"></div><div class="nv-shape shape-b"></div></div>
    <div class="nuvem-desenho nv-2"><div class="nv-shape shape-a"></div><div class="nv-shape shape-b"></div></div>
    <div class="nuvem-desenho nv-3"><div class="nv-shape shape-a"></div></div>
    <div class="nuvem-desenho nv-4"><div class="nv-shape shape-a"></div></div>

    <div class="main-container">
        <div class="gemini-symbol" style="top: 15%; left: 15%;">✦</div>
        <div class="gemini-symbol" style="top: 45%; right: 10%; animation-delay: 1s;">✦</div>
        <div class="gemini-symbol" style="bottom: 30%; left: 12%; animation-delay: 0.5s;">✦</div>
        <div class="gemini-symbol" style="bottom: 10%; right: 18%; animation-delay: 1.5s;">✦</div>

        <div class="card-arco" id="card-arco">
            <h1>Chá de Fralda</h1>
            <div class="versiculo">
                “Por este menino orava eu; e o Senhor me concedeu a petição que eu lhe fiz.”<br>
                <strong>1 SAMUEL 1:27</strong>
            </div>
            <div class="data-info">📅 12 DE JULHO DE 2026<br>🕒 ÀS 16:00 HORAS</div>
            <p style="font-size: 0.75rem; margin-bottom: 25px; position: relative; z-index: 6;">📍 RUA ITAPETININGA, 104</p>
            <div class="btn-stack">
                <a href="https://forms.gle/CN7gDBXfRJ5Yu6ky5" target="_blank" class="btn"><span>✅</span> CONFIRMAR PRESENÇA</a>
                <button class="btn" onclick="window.open('https://maps.app.goo.gl/8QiL9cSS7SXr73xS8', '_blank')"><span>📍</span> LOCALIZAÇÃO</button>
                <button class="btn" onclick="openModal()"><span>🎁</span> SUGESTÃO DE PRESENTES</button>
            </div>
        </div>
    </div>

    <div id="modalP" class="modal">
        <div class="modal-content">
            <h2 style="font-family: 'Playfair Display'; color: var(--dourado-texto);">Sugestão de Presentes</h2>
            <p style="margin: 20px 0;">Fralda + Mimo</p>
            <div style="display: flex; justify-content: space-around; font-weight: bold; color: var(--dourado-texto);">
                <span>P</span> <span>M</span> <span>G</span>
            </div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--dourado-texto); color: white;" onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <script>
        const fundo = document.getElementById('fundo-animado');
        const cardArco = document.getElementById('card-arco');

        for (let i = 0; i < 60; i++) {
            const estrela = document.createElement('div');
            estrela.className = 'estrela-fundo';
            estrela.style.left = Math.random() * 100 + 'vw';
            estrela.style.top = Math.random() * 100 + 'vh';
            const tamanho = Math.random() * 4 + 1 + 'px';
            estrela.style.width = tamanho;
            estrela.style.height = tamanho;
            estrela.style.animationDelay = Math.random() * 5 + 's';
            estrela.style.animationDuration = (Math.random() * 3 + 2) + 's';
            fundo.appendChild(estrela);
        }

        for (let i = 0; i < 8; i++) {
            const estrelaI = document.createElement('div');
            estrelaI.className = 'estrela-interna';
            estrelaI.innerHTML = '⭐';
            estrelaI.style.left = Math.random() * 90 + '%';
            estrelaI.style.top = Math.random() * 90 + '%';
            estrelaI.style.animationDelay = Math.random() * 2 + 's';
            cardArco.appendChild(estrelaI);
        }

        function openModal() { document.getElementById('modalP').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalP').style.display = 'none'; }
    </script>
</body>
</html>
